<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Narayan AI · BTechX</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #f5d07a;
      --gold-dim: #8a6f30;
      --black: #060608;
      --card: #141416;
      --border: rgba(201, 168, 76, 0.2);
      --text: #eee;
      --muted: #777;
      --error: #f87171;
      --success: #4ade80;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    .a1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.07), transparent 70%);
      top: -150px;
      left: -150px;
    }

    .btechx-banner {
      position: relative;
      z-index: 10;
      width: 100%;
      background: linear-gradient(135deg, #0a0800, #1a1200, #0a0800);
      border-bottom: 1px solid var(--gold-dim);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .btechx-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btechx-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: #000;
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }

    .btechx-name {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.1em;
    }

    .banner-sep {
      color: var(--gold-dim);
      font-size: 18px;
    }

    .banner-sub {
      font-size: 12px;
      color: var(--gold-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .page {
      position: relative;
      z-index: 1;
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 40%, var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 0 0 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: #0c0c0e;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12);
    }

    input::placeholder {
      color: #444;
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #000;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
      margin-top: 8px;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .alert.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--error);
    }

    .alert.success {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: var(--success);
    }

    .alert.show {
      display: block;
    }

    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }

    .page-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.1em;
    }

    .page-footer span {
      color: var(--gold-dim);
    }

    /* Step sections */
    .step {
      display: none;
    }

    .step.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="ambient a1"></div>

  <div class="btechx-banner">
    <div class="btechx-logo">
      <div class="btechx-icon">⚡</div>
      <span class="btechx-name">BTechX</span>
    </div>
    <span class="banner-sep">·</span>
    <span class="banner-sub">Narayan AI — Password Reset</span>
  </div>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <div class="card-icon" id="cardIcon">🔑</div>
        <div class="card-title" id="cardTitle">Reset Password</div>
        <div class="card-sub" id="cardSub">Enter your college email to receive a reset link</div>
      </div>

      <div class="divider"></div>
      <div class="alert error" id="alertBox"></div>

      <!-- Step 1: Enter email -->
      <div class="step active" id="step1">
        <div class="field">
          <label>College Email</label>
          <input type="email" id="email" placeholder="yourname@cgu-odisha.ac.in" />
        </div>
        <button class="btn" id="sendBtn" onclick="sendReset()">Send Reset Link →</button>
        <div class="card-footer"><a href="/">← Back to Login</a></div>
      </div>

      <!-- Step 2: Enter new password (from token in URL) -->
      <div class="step" id="step2">
        <div class="field">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Min. 8 characters" />
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter new password" />
        </div>
        <button class="btn" id="resetBtn" onclick="doReset()">Set New Password →</button>
      </div>
    </div>
  </div>

  <div class="page-footer">© 2024 <span>BTechX</span> · Narayan AI · CGU Odisha</div>

  <script>
    const alertBox = document.getElementById('alertBox');

    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = `alert ${type} show`;
    }

    // Check if we have a reset token in URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('cardIcon').textContent = '🔓';
      document.getElementById('cardTitle').textContent = 'Set New Password';
      document.getElementById('cardSub').textContent = 'Choose a strong new password for your account';
    }

    async function sendReset() {
      const email = document.getElementById('email').value.trim();
      if (!email) { showAlert('Please enter your college email.'); return; }

      const btn = document.getElementById('sendBtn');
      btn.disabled = true; btn.textContent = 'Sending…';
      alertBox.className = 'alert';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('📧 ' + data.message, 'success');
          btn.textContent = 'Email Sent!';
        } else {
          showAlert(data.error || 'Failed to send reset email.');
          btn.disabled = false; btn.textContent = 'Send Reset Link →';
        }
      } catch (e) {
        showAlert('Network error.');
        btn.disabled = false; btn.textContent = 'Send Reset Link →';
      }
    }

    async function doReset() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || !confirmPassword) { showAlert('Please fill in both fields.'); return; }
      if (newPassword.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
      if (newPassword !== confirmPassword) { showAlert('Passwords do not match.'); return; }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = 'Resetting…';
      alertBox.className = 'alert';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('✅ ' + data.message, 'success');
          btn.textContent = 'Done!';
          setTimeout(() => { window.location.href = '/'; }, 2000);
        } else {
          showAlert(data.error || 'Reset failed.');
          btn.disabled = false; btn.textContent = 'Set New Password →';
        }
      } catch (e) {
        showAlert('Network error.');
        btn.disabled = false; btn.textContent = 'Set New Password →';
      }
    }
  </script>
</body>

</html>
